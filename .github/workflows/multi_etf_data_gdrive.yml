name: Multi ETF GDrive Monitor

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours (UTC)
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  run-etf-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests yfinance openpyxl \
                      google-api-python-client \
                      google-auth

      - name: Run ETF monitor
        env:
          MY_EMAIL:                     ${{ secrets.MY_EMAIL }}
          MY_EMAIL_PSWRD:               ${{ secrets.MY_EMAIL_PSWRD }}
          TWILIO_ACCOUNT_SID_NEW:       ${{ secrets.TWILIO_ACCOUNT_SID_NEW }}
          TWILIO_NUMBER:                ${{ secrets.TWILIO_NUMBER }}
          TWILIO_TO_NUMBER_NEW:         ${{ secrets.TWILIO_TO_NUMBER_NEW }}
          TWILIO_AUTH_TOKEN_NEW:        ${{ secrets.TWILIO_AUTH_TOKEN_NEW }}
          GDRIVE_FILE_ID:               ${{ secrets.GDRIVE_FILE_ID }}
          GDRIVE_SERVICE_ACCOUNT_JSON:  ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
        run: python multi_etf_data_gdrive.py
